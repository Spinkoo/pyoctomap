# Alternative layout: manylinux job + separate Windows job (no macOS).
# Prefer workflows/release.yml for Linux + macOS + Windows in one matrix.
# Avoid enabling both workflows on the same `release: published` trigger.

name: Release to PyPI (cibuildwheel, split)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (informational only)"
        required: false
        default: "1.1.2"

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Display release info
        run: |
          echo "Building manylinux wheels (cibuildwheel)"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Input version: ${{ github.event.inputs.version }}"
          fi
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag: ${{ github.event.release.tag_name }}"
          fi

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp38-manylinux_x86_64 cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake3 make gcc gcc-c++ git
            chmod +x {project}/scripts/ci/build_octomap.sh
            bash {project}/scripts/ci/build_octomap.sh "{project}"

          CIBW_ENVIRONMENT_LINUX: "LD_LIBRARY_PATH={project}/src/octomap/lib:/usr/local/lib:/usr/local/lib64"

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel}

          CIBW_BEFORE_BUILD: "python -m pip install numpy cython"

          CIBW_TEST_COMMAND: python -c "import pyoctomap; from pyoctomap import OcTree; OcTree(0.1)"

      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls -la wheelhouse/

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: ./wheelhouse/*.whl

  build-wheels-windows:
    runs-on: windows-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: "cp38-win_amd64 cp39-win_amd64 cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64"
          CIBW_ARCHS: AMD64

          CIBW_BEFORE_ALL_WINDOWS: >
            powershell -NoProfile -ExecutionPolicy Bypass -File "{project}/scripts/ci/build_octomap_windows.ps1" -ProjectRoot "{project}"

          CIBW_BEFORE_BUILD: "python -m pip install numpy cython"

          CIBW_TEST_COMMAND: python -c "import pyoctomap; from pyoctomap import OcTree; OcTree(0.1)"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: ./wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel numpy cython

      - name: Build source distribution
        run: |
          python -m build --sdist
          echo "Source distribution:"
          ls -la dist/

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [build-wheels, build-wheels-windows, build-sdist]
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: ./wheels
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: ./dist

      - name: Combine packages for upload
        run: |
          echo "Combining wheels and sdist for upload"
          mkdir -p ./packages
          find ./wheels -type f -name '*.whl' -exec cp {} ./packages/ \;
          cp ./dist/*.tar.gz ./packages/
          echo "Packages:"
          ls -la ./packages/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages_dir: ./packages
          skip_existing: true
